<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TextArea</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <form>
        <h2>Formulario de contacto</h2>
        <!--SIMPLE INPUTS-->
        <fieldset>
            <legend>INFORMACION BASICA</legend>
            <div class="div_input">
                <label>Nombre completo
                <input type="text" placeholder="Mor Velazques">
                </label>
            </div>
            <div class="div_input">
                <label>Email
                <input type="email" placeholder="ejemplo@gmail.com">
                </label>
            </div>
        </fieldset>
        <!--SELECT & OPTION-->
        <div class="div_input">
            <label>Tipo de usuario
            <select name="type-of-user">
                <option value="user 1">Seguidor/a</option>
                <option value="user 2">Empresa</option>
                <option value="user 3">Otro</option>      
            </select>
            </label>
        </div>
        
        <!--DATALIST & OPTION-->
        <div class="div_input">
            <label>Referente
            <input list="referente" name="referente">
            <datalist id="referente" name="type-of-user">
                <option value="user 1">Kevin</option>
                <option value="Una empresa"></option>
                <option value="Un amigo"></option>      
            </datalist>
            </label>
        </div>
        <!--TEXTAREA-->
        <div class="div_input">
            <label>Dejar sus comentarios
            <textarea placeholder="textarea"></textarea> 
            </label>
        </div>
        <div class="div_input">
            <label>Acepto <a href="terms.html">terminos y condiciones</a>
            <input type="checkbox" class="checkbox">
            </label>
        </div>
    </form>    
</body>
</html>
