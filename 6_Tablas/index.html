<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablas</title></title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <table>
        <thead>
            <tr><!--FILA-->
                <th>Producto</th><!--Encabezado-->
                <th>Costo</th><!--Encabezado-->
                <th>Unidad</th><!--Encabezado-->
            </tr>
        </thead>
        <tbody>
            <tr><!--FILA-->
                <td>Platano</td><!--CELDA-->
                <td>$5</td><!--CELDA-->
                <td>1 kg</td><!--CELDA-->
            </tr>
            <tr><!--FILA-->
                <td>Melon</td><!--CELDA-->
                <td>$12</td><!--CELDA-->
                <td>1 Unidad</td><!--CELDA-->
            </tr>
            <tr><!--FILA-->
                <td>Mandarina</td><!--CELDA-->
                <td>$7</td><!--CELDA-->
                <td>1 kg</td><!--CELDA-->
                </tr>    
        </tbody>
        <tfoot>
            <tr><!--FILA-->
                <th class="headerTotal">Total</th><!--Encabezado-->
                <td class="costoTotal" colspan="2">$24</td><!--CELDA-->
            </tr>
        </tfoot>
    </table>
</body>
</html>
